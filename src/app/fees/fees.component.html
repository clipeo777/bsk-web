<app-header></app-header>
<div class="module-screen fees">
  <header class="module-header">
    <span class="module-tag">Finanzas</span>
    <h1>Gestión de cuotas</h1>
    <p>Centraliza el seguimiento de pagos, vencimientos y recordatorios automáticos.</p>
  </header>

  <section class="module-summary">
    <article class="summary-card">
      <i class="fa-solid fa-wallet"></i>
      <div>
        <h3>Total recaudado</h3>
        <p>$12.500 · Temporada 2026</p>
      </div>
    </article>
    <article class="summary-card">
      <i class="fa-solid fa-clock-rotate-left"></i>
      <div>
        <h3>Cuotas pendientes</h3>
        <p>18 jugadores con vencimiento en 7 días</p>
      </div>
    </article>
    <article class="summary-card">
      <i class="fa-solid fa-bell"></i>
      <div>
        <h3>Recordatorios programados</h3>
        <p>Próximo envío: 28/02/2026 · 09:00</p>
      </div>
    </article>
  </section>

  <section class="module-actions">
    <h2>Acciones principales</h2>
    <div class="action-grid">
      <button type="button" class="action-card">
        <i class="fa-solid fa-circle-plus"></i>
        <div>
          <span class="action-title">Registrar pago</span>
          <span>Ingresa un nuevo abono o pago completo.</span>
        </div>
      </button>
      <button type="button" class="action-card">
        <i class="fa-solid fa-list-check"></i>
        <div>
          <span class="action-title">Gestionar estados</span>
          <span>Actualiza el estado de cuenta por jugador.</span>
        </div>
      </button>
      <button type="button" class="action-card">
        <i class="fa-solid fa-envelope-open-text"></i>
        <div>
          <span class="action-title">Enviar recordatorios</span>
          <span>Configura correos y notificaciones automáticas.</span>
        </div>
      </button>
    </div>
  </section>
</div>
